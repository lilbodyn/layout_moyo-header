<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Moyo Header</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    >
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="./style.css"
    >
  </head>
  <body>
    <header class="header">
      <a
        href="#"
        class="logo"
      >
        <img
          src="./images/logo.png"
          alt="Moyo logo"
          class="logo__img"
        >
      </a>

      <nav class="nav">
        <ul class="nav__list">
          <li>
            <a
              href="#"
              class="nav__link is-active"
            >
              Apple
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
            >
              Samsung
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
            >
              Smartphones
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
              data-qa="hover"
            >
              Laptops & computers
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
            >
              Gadgets
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
            >
              Tablets
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
            >
              Photo
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav__link"
            >
              Video
            </a>
          </li>
        </ul>
      </nav>
    </header>
  </body>
</html>
